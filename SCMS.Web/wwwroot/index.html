<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCMS.Web</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="SCMS.Web.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div class="boot-loader" role="status" aria-live="polite">
            <div class="boot-mark" aria-hidden="true">+</div>
            <div class="boot-copy">
                <strong>SCMS</strong>
                <span>Loading clinic workspace...</span>
            </div>
            <div class="boot-wave" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">x</a>
    </div>
    <script src="js/downloads.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
